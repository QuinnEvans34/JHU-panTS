<svg viewBox="0 0 980 580" xmlns="http://www.w3.org/2000/svg" font-family="ui-sans-serif, system-ui, sans-serif" role="img">
  <title>What the model reads: the pancreas as a tensor of numbers</title>
  <desc>The cropped pancreas cube becomes a 3D array of shape 1 by 128 by 128 by 128: one channel (CT intensity, 0 to 1 from Hounsfield units) at each voxel. The 3D SegResNet returns an array of shape 3 by 128 by 128 by 128: a probability of background, pancreas, and lesion at every voxel; the largest is the label.</desc>
  <defs><marker id="ar" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6 Z" fill="#cbd5e1"/></marker></defs>
  <rect x="-50" y="-50" width="200%" height="200%" fill="#0b0f17"/>

  <text x="490" y="32" text-anchor="middle" font-size="18" font-weight="700" fill="#f1f5f9">What the model actually reads: the pancreas as a grid of numbers</text>
  <text x="490" y="53" text-anchor="middle" font-size="12" fill="#94a3b8">The cropped organ is just a 3D array of intensities in, and a per-voxel label out.</text>

