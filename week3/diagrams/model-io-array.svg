  <text x="62" y="434" font-size="16" font-weight="700" fill="#60a5fa">shape = [ 1, 128, 128, 128 ]</text>
  <text x="62" y="456" font-size="12" fill="#94a3b8">channels(1)  ·  depth  ·  height  ·  width</text>
  <text x="62" y="486" font-size="12" fill="#cbd5e1">Channel 0 = CT intensity  (the only channel we use).</text>
  <text x="62" y="506" font-size="12" fill="#64748b">Placeholder future channels: [organ mask?] · [vessels?] — an anatomy-context experiment.</text>

