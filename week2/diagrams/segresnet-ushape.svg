<svg viewBox="0 0 760 540" xmlns="http://www.w3.org/2000/svg" font-family="ui-sans-serif, system-ui, sans-serif" role="img">
  <title>SegResNet U-shape with tensor shapes</title>
  <desc>A 96-cube CT patch flows down an encoder that shrinks space and grows channels to a bottleneck, then up a decoder that restores resolution using skip connections, ending in a 3-class per-voxel prediction.</desc>
  <rect x="-50" y="-50" width="200%" height="200%" fill="#0b0f17"/>
  <defs>
    <marker id="a2" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#94a3b8"/>
    </marker>
  </defs>

  <text x="380" y="26" text-anchor="middle" font-size="16" font-weight="700" fill="#f1f5f9">SegResNet: encoder down, decoder up, skips across</text>
  <text x="380" y="45" text-anchor="middle" font-size="11.5" fill="#94a3b8">boxes show [channels @ cube size]; space shrinks going down, channels grow</text>

  <!-- skip connections (draw first, behind) -->
  <g stroke="#60a5fa" stroke-width="1.6" stroke-dasharray="5 4" marker-end="url(#a2)" fill="none">
    <line x1="185" y1="110" x2="535" y2="110"/>
    <line x1="245" y1="200" x2="475" y2="200"/>
    <line x1="305" y1="290" x2="415" y2="290"/>
  </g>
  <text x="360" y="102" text-anchor="middle" font-size="10.5" fill="#60a5fa" font-weight="600">skip connections carry fine detail across</text>

  <!-- ENCODER (left) -->
  <g>
    <rect x="70" y="86"  width="115" height="48" rx="8" fill="#1e293b" stroke="#475569" stroke-width="1.5"/>
    <text x="127" y="106" text-anchor="middle" font-size="12.5" font-weight="700" fill="#f1f5f9">16 @ 96³</text>
    <text x="127" y="123" text-anchor="middle" font-size="10" fill="#94a3b8">input conv</text>

    <rect x="100" y="176" width="115" height="48" rx="8" fill="#1e293b" stroke="#475569" stroke-width="1.5"/>
    <text x="157" y="196" text-anchor="middle" font-size="12.5" font-weight="700" fill="#f1f5f9">32 @ 48³</text>
    <text x="157" y="213" text-anchor="middle" font-size="10" fill="#94a3b8">2 res blocks</text>

    <rect x="130" y="266" width="115" height="48" rx="8" fill="#1e293b" stroke="#475569" stroke-width="1.5"/>
    <text x="187" y="286" text-anchor="middle" font-size="12.5" font-weight="700" fill="#f1f5f9">64 @ 24³</text>
    <text x="187" y="303" text-anchor="middle" font-size="10" fill="#94a3b8">2 res blocks</text>
  </g>

  <!-- BOTTLENECK (center bottom) -->
  <rect x="311" y="356" width="138" height="52" rx="8" fill="#1e3a5f" stroke="#60a5fa" stroke-width="2"/>
  <text x="380" y="377" text-anchor="middle" font-size="13" font-weight="700" fill="#f1f5f9">128 @ 12³</text>
  <text x="380" y="395" text-anchor="middle" font-size="10" fill="#cbd5e1">bottleneck · 4 res blocks · most context</text>

  <!-- DECODER (right) -->
  <g>
    <rect x="425" y="266" width="115" height="48" rx="8" fill="#1e293b" stroke="#475569" stroke-width="1.5"/>
    <text x="482" y="286" text-anchor="middle" font-size="12.5" font-weight="700" fill="#f1f5f9">64 @ 24³</text>
    <text x="482" y="303" text-anchor="middle" font-size="10" fill="#94a3b8">upsample</text>

    <rect x="455" y="176" width="115" height="48" rx="8" fill="#1e293b" stroke="#475569" stroke-width="1.5"/>
    <text x="512" y="196" text-anchor="middle" font-size="12.5" font-weight="700" fill="#f1f5f9">32 @ 48³</text>
    <text x="512" y="213" text-anchor="middle" font-size="10" fill="#94a3b8">upsample</text>

    <rect x="485" y="86"  width="115" height="48" rx="8" fill="#1e293b" stroke="#475569" stroke-width="1.5"/>
    <text x="542" y="106" text-anchor="middle" font-size="12.5" font-weight="700" fill="#f1f5f9">16 @ 96³</text>
    <text x="542" y="123" text-anchor="middle" font-size="10" fill="#94a3b8">upsample</text>
  </g>

  <!-- output head -->
  <rect x="620" y="86" width="118" height="48" rx="8" fill="#1e3a5f" stroke="#60a5fa" stroke-width="2"/>
  <text x="679" y="106" text-anchor="middle" font-size="12.5" font-weight="700" fill="#f1f5f9">3 @ 96³</text>
  <text x="679" y="123" text-anchor="middle" font-size="9.5" fill="#cbd5e1">bg / pancreas / lesion</text>

  <!-- down arrows -->
  <g stroke="#94a3b8" stroke-width="2" marker-end="url(#a2)">
    <line x1="127" y1="134" x2="150" y2="174"/>
    <line x1="157" y1="224" x2="180" y2="264"/>
    <line x1="200" y1="314" x2="345" y2="354"/>
    <!-- up arrows -->
    <line x1="415" y1="356" x2="470" y2="316"/>
    <line x1="482" y1="266" x2="505" y2="226"/>
    <line x1="512" y1="176" x2="535" y2="136"/>
    <!-- to head -->
    <line x1="600" y1="110" x2="618" y2="110"/>
  </g>

  <!-- side labels -->
  <text x="70" y="470" font-size="12" font-weight="700" fill="#f1f5f9">Encoder (down)</text>
  <text x="70" y="488" font-size="10.5" fill="#94a3b8">shrink space, grow channels → global shape</text>
  <text x="470" y="470" font-size="12" font-weight="700" fill="#f1f5f9">Decoder (up)</text>
  <text x="470" y="488" font-size="10.5" fill="#94a3b8">restore resolution → sharp per-voxel outline</text>

  <text x="380" y="520" text-anchor="middle" font-size="10.5" fill="#94a3b8">~4.7M parameters · GroupNorm · SuPreM weights loaded into the encoder, only the 3-class head is fresh</text>
</svg>
